# nginx config for the field-web PWA static bundle.
#
# The image runs unprivileged (UID 101) under Pod Security Standards
# `restricted`, so we listen on 8080 rather than 80. The Kubernetes Service
# fronts this on port 80 → targetPort 8080.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip — modest savings on JS/CSS, no CPU concern at this scale.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml;

    # Hashed asset files (Vite emits content-hashed names under /assets/*).
    # Safe to cache forever — bundle content is immutable per hash.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker MUST NOT be cached, otherwise PWA updates stall.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # PWA manifest + workbox files — short cache so updates propagate.
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=300";
    }
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — every non-asset, non-file URL serves index.html so
    # react-router-dom handles client-side routing.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Liveness/readiness probe target.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
