apiVersion: v1
kind: Namespace
metadata:
  name: cropautonomy
  labels:
    app.kubernetes.io/part-of: cropautonomy
    # Pod Security Standards — same posture as the agconn namespace in the
    # shared cluster: every pod runs non-root, drops all capabilities, sets
    # seccomp RuntimeDefault, no privilege escalation. `warn` + `audit` at the
    # same level surface drift at apply-time.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
