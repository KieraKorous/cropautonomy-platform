apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: cropautonomy
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/part-of: cropautonomy
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: workers }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workers
    spec:
      serviceAccountName: cropautonomy
      # Spot worker pool in agconn-prod — ~70% cost saving vs on-demand.
      # pg-boss reconnects after preemption and in-flight jobs requeue, so
      # the long-lived LISTEN/NOTIFY consumer is restart-safe.
      nodeSelector: { pool: worker }
      tolerations:
        - key: cloud.google.com/gke-spot
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: workers
          image: us-west1-docker.pkg.dev/agconn/cropautonomy/services:latest
          # Override the services image's default API entrypoint.
          command: ["/nodejs/bin/node", "/app/workers/dist/index.js"]
          envFrom:
            - configMapRef: { name: cropautonomy-config }
            - secretRef: { name: cropautonomy-env }
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { cpu: 200m, memory: 512Mi }
