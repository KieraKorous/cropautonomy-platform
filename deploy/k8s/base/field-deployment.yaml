apiVersion: apps/v1
kind: Deployment
metadata:
  name: field
  namespace: cropautonomy
  labels:
    app.kubernetes.io/name: field
    app.kubernetes.io/part-of: cropautonomy
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: field }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: field
    spec:
      serviceAccountName: cropautonomy
      nodeSelector: { pool: app }
      tolerations:
        - key: pool
          value: app
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: field
          image: us-west1-docker.pkg.dev/agconn/cropautonomy/field:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          # nginx needs write access to /var/cache/nginx and /var/run for the
          # PID file. The image's runtime stage already chowns those to UID 101
          # at build, but the readOnlyRootFilesystem flag would still block
          # writes — emptyDir mounts cover the writable paths.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: field
  namespace: cropautonomy
spec:
  selector: { app.kubernetes.io/name: field }
  ports:
    - port: 80
      targetPort: http
      name: http
  type: ClusterIP
