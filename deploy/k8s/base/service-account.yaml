# Default ServiceAccount for every Deployment in the cropautonomy namespace.
# Pods don't call GCP APIs at runtime — runtime secrets are projected from a
# K8s Secret (cropautonomy-env) that the deploy workflow creates from GitHub
# Actions secrets. No Workload Identity binding needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cropautonomy
  namespace: cropautonomy
